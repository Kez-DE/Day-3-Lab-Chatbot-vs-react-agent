<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grade Lookup — AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0b0f;
    --surface:  #111318;
    --surface2: #181c24;
    --border:   #1e2330;
    --border2:  #2a3045;
    --accent:   #4f8ef7;
    --accent2:  #7b5ea7;
    --green:    #2dd98f;
    --red:      #f75f5f;
    --amber:    #f7b955;
    --text:     #e8eaf0;
    --muted:    #6b7591;
    --muted2:   #8892aa;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: auto 1fr;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size: 40px 40px;
    opacity:.4; pointer-events:none; z-index:0;
  }
  header {
    grid-column: 1/-1;
    display:flex; align-items:center; gap:14px;
    padding:0 24px; height:52px;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:relative; z-index:10;
  }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header h1 { font-family:var(--mono); font-size:12px; letter-spacing:.08em; }
  .badge { margin-left:auto; font-family:var(--mono); font-size:10px; padding:3px 10px; border-radius:20px; border:1px solid var(--border2); color:var(--muted2); }

  aside {
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; z-index:5; overflow-y:auto;
  }
  .sidebar-section { padding:16px; border-bottom:1px solid var(--border); }
  .sidebar-label { font-family:var(--mono); font-size:9px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
  .input-group { margin-bottom:10px; }
  .input-group label { display:block; font-size:11px; color:var(--muted2); margin-bottom:4px; font-weight:500; }
  .input-group input {
    width:100%; background:var(--surface2); border:1px solid var(--border2);
    border-radius:6px; padding:8px 10px; font-family:var(--mono); font-size:12px;
    color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s;
  }
  .input-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.12); }
  .input-group input::placeholder { color:var(--muted); }
  .btn-run {
    width:100%; padding:9px; background:var(--accent); color:#fff;
    border:none; border-radius:6px; font-family:var(--mono); font-size:12px;
    font-weight:700; letter-spacing:.06em; cursor:pointer; transition:opacity .2s;
    margin-top:4px;
  }
  .btn-run:hover { opacity:.85; }
  .case-btn {
    display:flex; align-items:center; gap:8px; width:100%; padding:8px 10px;
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    color:var(--text); font-size:12px; cursor:pointer; transition:border-color .2s;
    margin-bottom:6px; text-align:left;
  }
  .case-btn:hover { border-color:var(--border2); }
  .case-tag { font-family:var(--mono); font-size:9px; padding:2px 6px; border-radius:10px; font-weight:700; white-space:nowrap; }
  .tag-gioi  { background:rgba(45,217,143,.15); color:var(--green); }
  .tag-kha   { background:rgba(79,142,247,.15);  color:var(--accent); }
  .tag-fail  { background:rgba(247,95,95,.15);   color:var(--red); }
  .tag-error { background:rgba(247,185,85,.15);  color:var(--amber); }

  main { display:flex; flex-direction:column; z-index:5; overflow:hidden; }
  .trace-area { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:10px; }
  .trace-area::-webkit-scrollbar { width:4px; }
  .trace-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
  .empty-icon { width:48px; height:48px; border:1px solid var(--border2); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .empty-state p { font-size:13px; }

  .step-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; animation:slideIn .25s ease forwards; opacity:0; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .step-header { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); background:var(--surface2); }
  .step-type { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.1em; padding:3px 8px; border-radius:4px; }
  .type-thought { background:rgba(123,94,167,.2); color:var(--accent2); }
  .type-action  { background:rgba(79,142,247,.2);  color:var(--accent); }
  .type-obs     { background:rgba(45,217,143,.2);  color:var(--green); }
  .type-error   { background:rgba(247,95,95,.2);   color:var(--red); }
  .type-final   { background:rgba(247,185,85,.2);  color:var(--amber); }
  .type-user    { background:rgba(139,92,246,.2);  color:#a78bfa; }
  .step-num  { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .step-tool { font-family:var(--mono); font-size:11px; color:var(--accent); margin-left:auto; }
  .step-body { padding:11px 14px; font-size:13px; line-height:1.6; color:var(--muted2); }
  .step-body pre { font-family:var(--mono); font-size:11px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:9px 12px; overflow-x:auto; margin-top:8px; color:var(--text); line-height:1.7; white-space:pre-wrap; }

  .result-card { background:var(--surface); border:1px solid var(--border2); border-radius:10px; overflow:hidden; animation:slideIn .3s ease forwards; }
  .result-header { padding:11px 16px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .result-header span { font-family:var(--mono); font-size:11px; color:var(--amber); font-weight:700; letter-spacing:.08em; }
  .result-body { padding:16px; }
  .student-name { font-size:19px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .student-meta { font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:14px; }
  .scores-grid { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
  .score-row { display:flex; align-items:center; gap:10px; padding:7px 10px; background:var(--surface2); border-radius:6px; border:1px solid var(--border); }
  .score-subj { font-size:12px; color:var(--muted2); flex:1; }
  .score-val { font-family:var(--mono); font-size:13px; font-weight:700; min-width:36px; text-align:right; }
  .score-val.pass { color:var(--green); }
  .score-val.fail { color:var(--red); }
  .score-bar-wrap { width:70px; height:4px; background:var(--border2); border-radius:2px; overflow:hidden; }
  .score-bar { height:100%; border-radius:2px; }
  .score-bar.pass { background:var(--green); }
  .score-bar.fail { background:var(--red); }
  .gpa-row { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; margin-bottom:10px; }
  .gpa-label { font-size:12px; color:var(--muted2); }
  .gpa-value { font-family:var(--mono); font-size:22px; font-weight:700; color:var(--text); }
  .rank-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:8px; font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:.06em; }
  .rank-xuat-sac { background:rgba(247,185,85,.15); color:var(--amber);  border:1px solid rgba(247,185,85,.3); }
  .rank-gioi     { background:rgba(45,217,143,.15); color:var(--green);  border:1px solid rgba(45,217,143,.3); }
  .rank-kha      { background:rgba(79,142,247,.15); color:var(--accent); border:1px solid rgba(79,142,247,.3); }
  .rank-tb       { background:rgba(247,95,95,.1);   color:var(--red);    border:1px solid rgba(247,95,95,.25); }
  .rank-yeu      { background:rgba(247,95,95,.15);  color:var(--red);    border:1px solid rgba(247,95,95,.3); }
  .note-box { margin-top:10px; padding:9px 12px; background:var(--surface2); border-left:3px solid var(--border2); border-radius:0 6px 6px 0; font-size:12px; color:var(--muted2); line-height:1.6; }
  .error-card { background:rgba(247,95,95,.06); border:1px solid rgba(247,95,95,.2); border-radius:10px; padding:14px; display:flex; gap:12px; align-items:flex-start; animation:slideIn .25s ease forwards; }
  .error-icon { font-size:18px; margin-top:1px; }
  .error-text { font-size:13px; color:var(--red); line-height:1.6; }
  .thinking { display:flex; gap:5px; align-items:center; padding:14px 18px; }
  .dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:bounce .9s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>STUDENT GRADE LOOKUP — ReAct Agent</h1>
  <span class="badge">Spring 2026</span>
</header>

<aside>
  <div class="sidebar-section">
    <div class="sidebar-label">Tra cứu trực tiếp</div>
    <div class="input-group">
      <label>Họ và tên</label>
      <input type="text" id="inp-name" placeholder="vd: Royce Lowe">
    </div>
    <div class="input-group">
      <label>Mã sinh viên (ID)</label>
      <input type="text" id="inp-id" placeholder="vd: 30">
    </div>
    <div class="input-group">
      <label>Số CCCD</label>
      <input type="text" id="inp-cccd" placeholder="vd: 822067">
    </div>
    <button class="btn-run" onclick="runQuery()">▶ RUN AGENT</button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">💬 Chat với Agent (LLM)</div>
    <div class="input-group">
      <label>Câu hỏi tự nhiên</label>
      <input type="text" id="inp-chat"
        placeholder="vd: cho tôi xem điểm Royce Lowe"
        onkeydown="if(event.key==='Enter') sendChat()">
    </div>
    <button class="btn-run" style="background:var(--accent2)" onclick="sendChat()">💬 GỬI</button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Evaluation Cases</div>
    <button class="case-btn" onclick="loadCase('Royce Lowe','','')">
      <span class="case-tag tag-gioi">GIỎI</span> Royce Lowe
    </button>
    <button class="case-btn" onclick="loadCase('Emmanuel Myers','','')">
      <span class="case-tag tag-kha">KHÁ</span> Emmanuel Myers
    </button>
    <button class="case-btn" onclick="loadCase('Kiara Perkins','','')">
      <span class="case-tag tag-fail">TRƯỢT MÔN</span> Kiara Perkins
    </button>
    <button class="case-btn" onclick="loadCase('','9999','')">
      <span class="case-tag tag-error">INVALID</span> ID không tồn tại
    </button>
    <button class="case-btn" onclick="loadCase('','','397793')">
      <span class="case-tag tag-gioi">CCCD</span> Sara Richards
    </button>
  </div>
</aside>

<main>
  <div class="trace-area" id="trace">
    <div class="empty-state" id="empty">
      <div class="empty-icon">⚡</div>
      <p>Chọn một case hoặc nhập thông tin để chạy agent</p>
    </div>
  </div>
</main>

<script>
const PASSING = 4.0;

function clearTrace() {
  document.getElementById('trace').innerHTML = '';
}

let stepDelay = 0;

function addCard(html, delay) {
  setTimeout(() => {
    const t = document.getElementById('trace');
    t.insertAdjacentHTML('beforeend', html);
    t.scrollTop = t.scrollHeight;
  }, delay);
}

function addThinking(delay) {
  setTimeout(() => {
    const t = document.getElementById('trace');
    t.insertAdjacentHTML('beforeend',
      `<div class="thinking" id="thinking-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`);
    t.scrollTop = t.scrollHeight;
  }, delay);
}

function removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

function stepCard(type, typeLabel, step, tool, body, delay) {
  const toolHtml = tool ? `<span class="step-tool">${tool}()</span>` : '';
  const stepHtml = step ? `<span class="step-num">Step ${step}</span>` : '';
  addCard(`<div class="step-card">
    <div class="step-header">
      <span class="step-type type-${type}">${typeLabel}</span>
      ${stepHtml}${toolHtml}
    </div>
    <div class="step-body">${body}</div>
  </div>`, delay);
}

function loadCase(name, id, cccd) {
  document.getElementById('inp-name').value = name;
  document.getElementById('inp-id').value   = id;
  document.getElementById('inp-cccd').value = cccd;
  runQuery();
}

// ── RUN AGENT (direct) ────────────────────────────────────────────────────────
async function runQuery() {
  const name = document.getElementById('inp-name').value.trim();
  const sid  = document.getElementById('inp-id').value.trim();
  const cccd = document.getElementById('inp-cccd').value.trim();
  if (!name && !sid && !cccd) return;

  clearTrace();
  stepDelay = 0;
  const D = 400;

  stepCard('thought','THOUGHT',1,null,'Cần xác thực thông tin sinh viên từ cơ sở dữ liệu.', stepDelay);
  addThinking(stepDelay += D);
  stepCard('action','ACTION',1,'validate_student',
    `<pre>validate_student(\n  student_id="${sid}",\n  student_name="${name}",\n  id_card="${cccd}"\n)</pre>`,
    stepDelay += D);
  stepCard('thought','THOUGHT',2,null,'Tra cứu điểm học kỳ Spring 2026...', stepDelay += D);
  addThinking(stepDelay += D);
  stepCard('action','ACTION',2,'student_grades_lookup',
    `<pre>student_grades_lookup(student_id=..., semester="Spring 2026")</pre>`, stepDelay += D);
  stepCard('thought','THOUGHT',3,null,'Lấy chính sách qua môn và xếp loại học lực.', stepDelay += D);
  addThinking(stepDelay += D);
  stepCard('action','ACTION',3,'grade_policy_lookup','<pre>grade_policy_lookup()</pre>', stepDelay += D);
  stepCard('thought','THOUGHT',4,null,'Tính GPA, kiểm tra môn trượt, xếp loại...', stepDelay += D);
  addThinking(stepDelay += D);

  try {
    const resp = await fetch('http://localhost:8000/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_name: name, student_id: sid, id_card: cccd, semester: 'Spring 2026' })
    });
    const data = await resp.json();
    showResult(data.result, stepDelay + D);
  } catch(e) {
    setTimeout(() => {
      removeThinking();
      addCard(`<div class="error-card"><div class="error-icon">⚠️</div>
        <div class="error-text">Không kết nối được server.<br>Hãy chạy: <code style="background:var(--bg);padding:2px 6px;border-radius:4px">python server.py</code></div>
      </div>`, 0);
    }, stepDelay + D);
  }
}

// ── CHAT (LLM) ────────────────────────────────────────────────────────────────
async function sendChat() {
  const msg = document.getElementById('inp-chat').value.trim();
  if (!msg) return;

  clearTrace();
  addCard(`<div class="step-card">
    <div class="step-header"><span class="step-type type-user">USER</span></div>
    <div class="step-body">${msg}</div>
  </div>`, 0);
  addThinking(300);

  try {
    const resp = await fetch('http://localhost:8000/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await resp.json();
    setTimeout(() => {
      removeThinking();
      showResult(data.result, 0);
    }, 800);
  } catch(e) {
    setTimeout(() => {
      removeThinking();
      addCard(`<div class="error-card"><div class="error-icon">⚠️</div>
        <div class="error-text">Không kết nối được server.<br>Hãy chạy: <code style="background:var(--bg);padding:2px 6px;border-radius:4px">python server.py</code></div>
      </div>`, 0);
    }, 500);
  }
  document.getElementById('inp-chat').value = '';
}

// ── Render result ─────────────────────────────────────────────────────────────
function showResult(apiResult, delay) {
  setTimeout(() => {
    removeThinking();
    if (!apiResult) return;

    const isError = apiResult.startsWith('❌') || apiResult.startsWith('⚠️');
    if (isError) {
      addCard(`<div class="error-card"><div class="error-icon">❌</div>
        <div class="error-text">${apiResult.replace(/\n/g,'<br>')}</div>
      </div>`, 0);
      return;
    }

    // Parse text output từ Python agent
    const lines = apiResult.split('\n');
    const get = (key) => { const l = lines.find(l => l.includes(key)); return l ? l.split(':').slice(1).join(':').trim() : ''; };

    const name  = get('Sinh viên :');
    const mssv  = get('MSSV      :');
    const cccd  = get('CCCD      :');
    const gpa   = get('GPA học kỳ');
    const rank  = get('Xếp loại học lực');
    const note  = get('Ghi chú');

    const scoreLines = lines.filter(l => l.trim().startsWith('•'));
    const scoreRows = scoreLines.map(l => {
      const clean  = l.replace('•','').replace('❌ Trượt','').trim();
      const failed = l.includes('❌');
      const parts  = clean.split(/\s{2,}/);
      const subj   = parts[0] ? parts[0].trim() : '';
      const val    = parts[1] ? parseFloat(parts[1]) : 0;
      const pct    = Math.round(val / 10 * 100);
      return `<div class="score-row">
        <span class="score-subj">${subj}</span>
        <div class="score-bar-wrap"><div class="score-bar ${failed?'fail':'pass'}" style="width:${pct}%"></div></div>
        <span class="score-val ${failed?'fail':'pass'}">${val.toFixed(2)}${failed?' ❌':''}</span>
      </div>`;
    }).join('');

    const rankCls = rank==='Xuất sắc'?'rank-xuat-sac':rank==='Giỏi'?'rank-gioi':rank==='Khá'?'rank-kha':rank==='Trung bình'?'rank-tb':'rank-yeu';

    // Nếu không parse được (câu trả lời dạng tự do từ LLM) → hiện plain text
    if (!name && !scoreRows) {
      addCard(`<div class="result-card">
        <div class="result-header"><span>⚡ FINAL ANSWER</span></div>
        <div class="result-body">
          <pre>${apiResult}</pre>
        </div>
      </div>`, 0);
      return;
    }

    addCard(`<div class="result-card">
      <div class="result-header"><span>⚡ FINAL ANSWER — Spring 2026</span></div>
      <div class="result-body">
        <div class="student-name">${name}</div>
        <div class="student-meta">MSSV: ${mssv} &nbsp;·&nbsp; CCCD: ${cccd}</div>
        <div class="scores-grid">${scoreRows}</div>
        <div class="gpa-row">
          <span class="gpa-label">Điểm trung bình học kỳ (GPA)</span>
          <span class="gpa-value">${gpa}</span>
        </div>
        <div class="rank-badge ${rankCls}">🎓 ${rank}</div>
        <div class="note-box">${note}</div>
      </div>
    </div>`, 0);
  }, delay);
}
</script>
</body>
</html>
